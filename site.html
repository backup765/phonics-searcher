<style>
  .wrapper {
    font-family: sans-serif;
    max-width: 100%;
    margin: 0 auto;
  }

  .master-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .ctrl-btn {
    flex: 1;
    padding: 10px;
    cursor: pointer;
    background: #444;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: bold;
    text-transform: uppercase;
  }

  .main-container {
    display: flex;
    align-items: stretch; /* Ensures sidebar matches grid height */
    gap: 10px;
  }

  /* Sidebar for Row Buttons */
  .row-sidebar {
    display: grid;
    grid-template-rows: repeat(7, 1fr); /* 7 rows */
    width: 40px;
  }

  .row-btn-container {
    display: flex;
    align-items: center; /* Vertically centers button in the row space */
    justify-content: center;
  }

  .row-btn {
    width: 30px;
    height: 30px;
    background: #888;
    color: white;
    border: none;
    border-radius: 50%; /* Circular buttons */
    cursor: pointer;
    font-size: 10px;
    font-weight: bold;
    transition: background 0.2s;
  }

  .row-btn:hover { background: #555; }

  /* Grid Wrapper with Fixed Aspect Ratio (900/630) */
  .grid-wrapper {
    position: relative;
    flex-grow: 1;
    background-image: url('https://itoigawa-test.carrd.co/assets/images/image01.jpg?v=dff670dd'); 
    background-size: 100% 100%;
    background-repeat: no-repeat;
    /* Aspect Ratio logic: width / height = 900 / 630 */
    aspect-ratio: 900 / 630; 
  }

  #checkbox-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(7, 1fr);
    height: 100%; /* Important to fill the aspect-ratio container */
    width: 100%;
  }

  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-sizing: border-box;
    transition: all 0.1s ease;
    font-size: 0.8rem;
    font-weight: bold;
    user-select: none;
    border: 0.5px solid rgba(0, 0, 0, 0.05);
  }

  .tile[data-state="0"] { background: rgba(255, 255, 255, 0.5); color: #000; }
  .tile[data-state="1"] { background: rgba(76, 175, 80, 0.5); color: #fff; }
  .tile[data-state="2"] { background: rgba(255, 193, 7, 0.7); color: #000; }

  .action-btn {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    background: #000;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
</style>

<div class="wrapper">
  <div class="master-controls">
    <button class="ctrl-btn" onclick="setAll(1)">All On</button>
    <button class="ctrl-btn" onclick="setAll(0)">All Off</button>
  </div>

  <div class="main-container">
    <div class="row-sidebar" id="row-sidebar"></div>
    <div class="grid-wrapper">
      <div id="checkbox-grid"></div>
    </div>
  </div>

  <button id="action-button" class="action-btn">Print Selected List</button>
</div>

<script>
  const grid = document.getElementById('checkbox-grid');
  const sidebar = document.getElementById('row-sidebar');
  const cols = 6;
  const rows = 7;

  // 1. Generate Sidebar Buttons
  for (let r = 0; r < rows; r++) {
    const container = document.createElement('div');
    container.classList.add('row-btn-container');
    
    const btn = document.createElement('button');
    btn.classList.add('row-btn');
    btn.innerText = 'R' + (r + 1);
    btn.onclick = () => setRow(r, 1);
    
    container.appendChild(btn);
    sidebar.appendChild(container);
  }

  // 2. Generate Grid Tiles
  for (let i = 1; i <= (cols * rows); i++) {
    const tile = document.createElement('div');
    tile.classList.add('tile');
    tile.setAttribute('data-state', '0');
    tile.setAttribute('data-value', i);
    const rowIndex = Math.floor((i - 1) / cols);
    tile.setAttribute('data-row', rowIndex);
    tile.innerText = i;
    
    tile.addEventListener('click', function() {
      let nextState = (parseInt(this.getAttribute('data-state')) + 1) % 3;
      this.setAttribute('data-state', nextState);
    });

    grid.appendChild(tile);
  }

  function setAll(state) {
    document.querySelectorAll('.tile').forEach(t => t.setAttribute('data-state', state));
  }

  function setRow(rowIdx, state) {
    document.querySelectorAll(`.tile[data-row="${rowIdx}"]`).forEach(t => t.setAttribute('data-state', state));
  }

  document.getElementById('action-button').addEventListener('click', () => {
    let output = [];
    document.querySelectorAll('.tile').forEach(tile => {
      const state = tile.getAttribute('data-state');
      const val = tile.getAttribute('data-value');
      if (state === "1") output.push(val);
      else if (state === "2") output.push("!" + val);
    });
    alert(output.length > 0 ? "Result: " + output.join(", ") : "Empty");
  });
</script>
